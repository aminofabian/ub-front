<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <title>Access Denied — UB</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            body {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #0a0a0a;
                color: #fafafa;
                padding: 2rem 1rem;
            }

            .card {
                width: 100%;
                max-width: 28rem;
                border: 1px solid rgba(255, 255, 255, 0.08);
                background: rgba(23, 23, 23, 0.95);
                border-radius: 1rem;
                padding: 2.5rem 2rem;
                text-align: center;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(12px);
            }

            .icon-circle {
                width: 3.5rem;
                height: 3.5rem;
                border-radius: 50%;
                background: rgba(239, 68, 68, 0.12);
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 1.5rem;
            }

            .icon-circle svg {
                width: 1.75rem;
                height: 1.75rem;
                color: #ef4444;
            }

            h1 {
                font-size: 1.5rem;
                font-weight: 600;
                letter-spacing: -0.02em;
                margin-bottom: 0.75rem;
            }

            p {
                font-size: 0.875rem;
                line-height: 1.6;
                color: rgba(250, 250, 250, 0.55);
                margin-bottom: 1.5rem;
            }

            .actions {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            @media (min-width: 400px) {
                .actions {
                    flex-direction: row;
                    justify-content: center;
                }
            }

            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 0.5rem;
                font-size: 0.875rem;
                font-weight: 500;
                padding: 0.5rem 1.25rem;
                text-decoration: none;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    opacity 0.15s ease;
                white-space: nowrap;
            }

            .btn-primary {
                background: #fafafa;
                color: #0a0a0a;
            }

            .btn-primary:hover {
                opacity: 0.85;
            }

            .btn-outline {
                background: transparent;
                color: #fafafa;
                border: 1px solid rgba(255, 255, 255, 0.15);
            }

            .btn-outline:hover {
                background: rgba(255, 255, 255, 0.06);
            }

            .footnote {
                margin-top: 2rem;
                font-size: 0.75rem;
                color: rgba(250, 250, 250, 0.35);
            }

            .footnote a {
                color: rgba(250, 250, 250, 0.5);
                text-decoration: underline;
                text-underline-offset: 2px;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="icon-circle">
                <!-- Shield-X icon (inline SVG so no external deps) -->
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path
                        d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.06 1.06 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"
                    />
                    <path d="m14.5 9.5-5 5" />
                    <path d="m9.5 9.5 5 5" />
                </svg>
            </div>

            <h1>Access Denied</h1>
            <p>
                You don&rsquo;t have permission to access this page. If you
                believe this is a mistake, please sign in with an account that
                has the required access or contact your administrator.
            </p>

            <div class="actions">
                <a href="/login" class="btn btn-primary">Sign in</a>
                <a href="/" class="btn btn-outline">Go home</a>
            </div>

            <div class="footnote">
                Need help? <a href="/super-admin/login">Super-admin sign-in</a>
            </div>
        </div>
    </body>
</html>
